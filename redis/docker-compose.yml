services:
  # ---- Provisioning (one-shot, idempotent) ----
  # Certificat TLS auto-signé pour l'accès externe (apanel/ via
  # Traefik TCP passthrough). Ne régénère jamais un certificat existant .
  redis-tls-init:
    image: alpine:3.20
    container_name: redis-tls-init
    restart: "no"
    volumes:
      - redis_certs:/certs
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        apk add --no-cache openssl >/dev/null
        if [ ! -f /certs/server.crt ]; then
          openssl req -new -x509 -days 825 -nodes \
            -newkey rsa:2048 \
            -keyout /certs/server.key -out /certs/server.crt \
            -subj "/CN=${REDIS_TLS_CN:-redis-tcp.azteas.com}"
          echo "Certificat TLS Redis généré (CN=${REDIS_TLS_CN:-redis-tcp.azteas.com})."
        else
          echo "Certificat TLS Redis déjà présent, inchangé."
        fi
        # 644 (et non 600 comme pour Postgres) : redis-stack-server ne fait
        # pas de vérification stricte des permissions de sa clé TLS, mais son
        # UID d'exécution exact n'est pas garanti (pas de USER dans l'image) —
        # à défaut de le confirmer, on privilégie la lisibilité pour éviter un
        # échec de démarrage plutôt qu'une permission trop stricte.
        chmod 644 /certs/server.key

  # --aclfile exige que le fichier existe déjà — Redis refuse de démarrer
  # sinon ("Error loading ACLs... No such file or directory"), il ne le crée
  # pas tout seul. Le crée vide s'il est absent (ACL SAVE, dans
  # apanel-redis-init, le remplira ensuite) ; ne touche jamais un fichier déjà
  # rempli. 666 : UID d'exécution de redis-stack-server non garanti (cf.
  # redis-tls-init ci-dessus), même raisonnement.
  redis-aclfile-init:
    image: alpine:3.20
    container_name: redis-aclfile-init
    restart: "no"
    volumes:
      - redis_data:/data
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        if [ ! -f /data/users.acl ]; then
          touch /data/users.acl
          chmod 666 /data/users.acl
          echo "/data/users.acl créé (vide)."
        else
          echo "/data/users.acl déjà présent, inchangé."
        fi

  redis:
    image: redis/redis-stack-server:latest
    container_name: redis
    restart: unless-stopped
    depends_on:
      redis-tls-init:
        condition: service_completed_successfully
      redis-aclfile-init:
        condition: service_completed_successfully
    environment:
      # Port 6379 en clair conservé pour les consommateurs internes (Plane,
      # redis-commander, sur azteas-net) ; port 6380 en TLS pour l'accès
      # externe via Traefik TCP passthrough (apanel/Vercel).
      # Commandes dangereuses bloquées via l'ACL dédiée (-@dangerous, cf.
      # apanel/init/redis-acl-init.sh) plutôt que --rename-command : les
      # modules de redis-stack-server (RediSearch, RedisJSON...) appellent
      # CONFIG en interne via l'API module, et le renommer les fait planter
      # (segfault confirmé en prod — RM_CallReplyArrayElement sur une
      # réponse d'erreur "unknown command").
      - REDIS_ARGS=--requirepass ${REDIS_PASSWORD} --appendonly yes --databases 16
        --maxmemory 1000mb --maxmemory-policy allkeys-lru
        --tls-port 6380 --tls-cert-file /certs/server.crt --tls-key-file /certs/server.key --tls-ca-cert-file /certs/server.crt
        --aclfile /data/users.acl
    volumes:
      - redis_data:/data
      - redis_certs:/certs:ro
    networks:
      - redis_net
      - coolify
      - azteas-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - traefik.enable=true
      - traefik.docker.network=azteas-net
      # Redis 6+ négocie son propre TLS sur le port 6380 (pas de SNI côté
      # client) — Traefik route par port en passthrough, comme pour Postgres.
      - traefik.tcp.routers.redis-tcp.rule=HostSNI(`*`)
      - traefik.tcp.routers.redis-tcp.entrypoints=redis-tls
      - traefik.tcp.routers.redis-tcp.tls.passthrough=true
      - traefik.tcp.services.redis-tcp.loadbalancer.server.port=6380

  # Traduit `ACL LOG` (échecs AUTH) en lignes de log exploitables par la jail
  # fail2ban redis-auth — Redis ne loggue nativement aucun échec d'auth dans
  # un fichier. Poll best-effort (5s) ; purge ACL LOG après chaque lecture
  # pour ne pas réémettre indéfiniment les mêmes entrées.
  redis-acl-log-exporter:
    image: redis:7-alpine
    container_name: redis-acl-log-exporter
    restart: unless-stopped
    # Root explicite : évite de dépendre de l'UID par défaut de l'image (pas
    # garanti côté alpine) pour écrire dans /var/log/redis bind-monté — plus
    # de prérequis manuel de permissions sur le VPS (même classe de bug que
    # /var/log/postgresql, corrigé en amont).
    user: "0:0"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - /var/log/redis:/var/log/redis
    networks:
      - redis_net
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        while true; do
          LOG=$$(redis-cli -h redis -a "$$REDIS_PASSWORD" --no-auth-warning ACL LOG 2>/dev/null || true)
          if echo "$$LOG" | grep -q 'reason=auth'; then
            TS=$$(date '+%Y-%m-%d %H:%M:%S')
            echo "$$LOG" | grep -oE 'addr=[0-9.]+' | cut -d= -f2 | sort -u | while read -r ip; do
              echo "$$TS redis AUTH_FAILED host=$$ip" >> /var/log/redis/redis-auth.log
            done
            redis-cli -h redis -a "$$REDIS_PASSWORD" --no-auth-warning ACL LOG RESET > /dev/null
          fi
          sleep 5
        done

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis-commander
    restart: unless-stopped
    environment:
      - REDIS_HOSTS=local:redis:6379:0:${REDIS_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.docker.network=azteas-net
      - traefik.http.routers.redis-commander.entrypoints=websecure
      - traefik.http.routers.redis-commander.rule=Host(`redis.azteas.com`)
      - traefik.http.routers.redis-commander.tls=true
      - traefik.http.routers.redis-commander.tls.certresolver=letsencrypt
      - traefik.http.routers.redis-commander.middlewares=auth-basic@file,secure-headers@file,rate-limit-admin@file
      - traefik.http.services.redis-commander-svc.loadbalancer.server.port=8081
    networks:
      - redis_net
      - azteas-net

networks:
  redis_net:
    driver: bridge
  azteas-net:
    external: true
    name: azteas-net
  coolify:
    external: true
    name: coolify

volumes:
  redis_data: {}
  redis_certs: {}
