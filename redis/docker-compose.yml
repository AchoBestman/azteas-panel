services:
  redis:
    image: redis/redis-stack-server:latest
    container_name: redis
    restart: unless-stopped
    environment:
      - REDIS_ARGS=--requirepass ${REDIS_PASSWORD} --appendonly yes --databases 16 --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - redis_net
      - coolify
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis-commander
    restart: unless-stopped
    environment:
      - REDIS_HOSTS=local:redis:6379:0:${REDIS_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.docker.network=azteas-net
      - traefik.http.routers.redis-commander.entrypoints=websecure
      - traefik.http.routers.redis-commander.rule=Host(`redis.azteas.com`)
      - traefik.http.routers.redis-commander.tls=true
      - traefik.http.routers.redis-commander.tls.certresolver=letsencrypt
      - traefik.http.routers.redis-commander.middlewares=auth-basic@file,secure-headers@file,rate-limit-admin@file
      - traefik.http.services.redis-commander-svc.loadbalancer.server.port=8081
    networks:
      - redis_net
      - azteas-net

networks:
  redis_net:
    driver: bridge
  azteas-net:
    external: true
    name: azteas-net
  coolify:
    external: true
    name: coolify

volumes:
  redis_data: {}
