global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Métriques système du VPS (CPU, RAM, disque, réseau)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # Métriques Prometheus lui-même
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
