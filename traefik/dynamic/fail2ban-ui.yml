# Route vers fail2ban-ui, qui tourne en network_mode:host (image
# swissmakers/fail2ban-ui) et n'est donc pas découvrable via les labels
# Docker habituels. Le conteneur Traefik atteint l'hôte via
# host.docker.internal (cf. extra_hosts dans traefik/docker-compose.yml).
#
# ⚠️ Sans OIDC, fail2ban-ui n'a aucune authentification native : auth-basic@file
# est donc obligatoire ici (voir fail2ban-ui/.env.example).

http:
  routers:
    fail2ban-ui:
      rule: "Host(`f2b.azteas.com`)"
      entrypoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - auth-basic@file
        - secure-headers@file
        - rate-limit-admin@file
      service: fail2ban-ui-svc

  services:
    fail2ban-ui-svc:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8080"
