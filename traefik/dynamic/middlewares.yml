# Middlewares globaux réutilisables par tous les services

http:
  middlewares:

    # Authentification HTTP basique (dashboard Traefik, interfaces admin)
    auth-basic:
      basicAuth:
        usersFile: /etc/traefik/dynamic/.htpasswd

    # Headers de sécurité appliqués à toutes les routes publiques
    secure-headers:
      headers:
        forceSTSHeader: true
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "strict-origin-when-cross-origin"
        frameDeny: true
        contentSecurityPolicy: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com; img-src 'self' data: https:; font-src 'self' data: https://cdn.jsdelivr.net https://unpkg.com; connect-src 'self' https: wss:; frame-ancestors 'none';"
        permissionsPolicy: "camera=(), microphone=(), geolocation=(), payment=(), usb=()"
        customResponseHeaders:
          Server: ""
          X-Powered-By: ""

    # Rate limiting usage général (50 req/s, pic 20)
    rate-limit:
      rateLimit:
        average: 50
        burst: 20

    # Rate limiting strict pour interfaces admin (pgAdmin, phpMyAdmin, dashboard, etc. 10 req/s, pic 5)
    rate-limit-admin:
      rateLimit:
        average: 10
        burst: 5
