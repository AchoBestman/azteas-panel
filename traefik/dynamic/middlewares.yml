# Middlewares globaux réutilisables par tous les services

http:
  middlewares:

    # Authentification HTTP basique (dashboard Traefik, interfaces admin)
    auth-basic:
      basicAuth:
        usersFile: /etc/traefik/dynamic/.htpasswd

    # Headers de sécurité appliqués à toutes les routes publiques
    secure-headers:
      headers:
        forceSTSHeader: true
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "strict-origin-when-cross-origin"
        frameDeny: true
        contentSecurityPolicy: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://unpkg.com https://code.jquery.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com; img-src 'self' data: https:; font-src 'self' data: https://cdn.jsdelivr.net https://unpkg.com; connect-src 'self' https: wss:; frame-ancestors 'none';"
        permissionsPolicy: "camera=(), microphone=(), geolocation=(), payment=(), usb=()"
        customResponseHeaders:
          Server: ""
          X-Powered-By: ""

    # Rate limiting usage général (50 req/s, pic 20)
    rate-limit:
      rateLimit:
        average: 50
        burst: 20

    # Rate limiting strict pour interfaces admin (dashboard Traefik, etc.)
    rate-limit-admin:
      rateLimit:
        average: 10
        burst: 5

    # Rate limiting pour pgAdmin (charge beaucoup de ressources statiques au démarrage)
    rate-limit-pgadmin:
      rateLimit:
        average: 50
        burst: 100

    # Rate limiting pour grafana (charge beaucoup de ressources statiques au démarrage)
    rate-limit-grafana:
      rateLimit:
        average: 50
        burst: 100

    # Rate limiting pour fail2ban-ui (charge ~25 fichiers JS/CSS au démarrage)
    rate-limit-fail2ban-ui:
      rateLimit:
        average: 50
        burst: 100

    # Rate limiting pour Mailcow/SOGo. Plus haut que la limite générale car de
    # nombreux utilisateurs partagent souvent une même IP publique (CGNAT
    # opérateur mobile/FAI) — la limite par défaut (50/20) était atteinte par le
    # trafic cumulé de tout le monde sur ces IP partagées, pas par un abus réel
    # (confirmé via /var/log/traefik/access.log : plusieurs IP 197.214.238.x
    # différentes toutes 429, même plage que d'anciens bans fail2ban légitimes).
    rate-limit-mailcow:
      rateLimit:
        average: 200
        burst: 100

    # Bloque inconditionnellement une route (403) : sourceRange ne matche jamais
    # une IP cliente réelle. Utilisé pour interdire /user sur Mailcow — seuls les
    # admins doivent accéder à l'interface Mailcow (via /admin), pas les mailbox users.
    deny-all:
      ipAllowList:
        sourceRange:
          - "127.0.0.1/32"
