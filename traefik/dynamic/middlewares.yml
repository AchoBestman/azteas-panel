# Middlewares globaux réutilisables par tous les services

http:
  middlewares:

    # Authentification HTTP basique (dashboard Traefik, interfaces admin)
    auth-basic:
      basicAuth:
        usersFile: /etc/traefik/dynamic/.htpasswd

    # Headers de sécurité appliqués à toutes les routes publiques
    secure-headers:
      headers:
        forceSTSHeader: true
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "strict-origin-when-cross-origin"
        frameDeny: true
        contentSecurityPolicy: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://unpkg.com https://code.jquery.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com; img-src 'self' data: https:; font-src 'self' data: https://cdn.jsdelivr.net https://unpkg.com; connect-src 'self' https: wss:; frame-ancestors 'none';"
        permissionsPolicy: "camera=(), microphone=(), geolocation=(), payment=(), usb=()"
        customResponseHeaders:
          Server: ""
          X-Powered-By: ""

    # Rate limiting usage général (50 req/s, pic 20)
    rate-limit:
      rateLimit:
        average: 50
        burst: 20

    # Rate limiting strict pour interfaces admin (dashboard Traefik, etc.)
    rate-limit-admin:
      rateLimit:
        average: 10
        burst: 5

    # Rate limiting pour pgAdmin (charge beaucoup de ressources statiques au démarrage)
    rate-limit-pgadmin:
      rateLimit:
        average: 50
        burst: 100

    # Rate limiting pour grafana (charge beaucoup de ressources statiques au démarrage)
    rate-limit-grafana:
      rateLimit:
        average: 50
        burst: 100

    # Rate limiting pour fail2ban-ui (charge ~25 fichiers JS/CSS au démarrage)
    rate-limit-fail2ban-ui:
      rateLimit:
        average: 50
        burst: 100

    # Rate limiting pour Mailcow/SOGo. Le rateLimit de Traefik est calculé par IP
    # source ; derrière un NAT d'entreprise ou un CGNAT mobile/FAI, des dizaines
    # voire des centaines d'utilisateurs partagent une seule IP et donc un seul
    # quota. Dimensionné pour absorber un pic de connexions simultanées
    # (ex: ~100 employés ouvrant leur webmail en même temps le matin, chaque
    # chargement de page générant ~20-30 requêtes) sans pénaliser du trafic
    # légitime (confirmé via /var/log/traefik/access.log : plusieurs IP
    # 197.214.238.x différentes toutes 429, même plage que d'anciens bans
    # fail2ban légitimes — ce n'était pas de l'abus).
    rate-limit-mailcow:
      rateLimit:
        average: 1000
        burst: 500

    # Redirige /user vers / au lieu d'un blocage brutal (403) : seuls les
    # admins doivent utiliser l'interface Mailcow (via /admin), pas les
    # mailbox users. La page de login Mailcow (/) redirige elle-même les
    # mailbox users authentifiés vers /SOGo/so/ (cf. data/web/index.php de
    # mailcow-dockerized : rôle "user" + sogo_access actif), donc rediriger
    # ici plutôt que bloquer ne les renvoie jamais sur une page inaccessible.
    redirect-user-to-root:
      redirectRegex:
        regex: "^(https?://[^/]+)/user.*"
        replacement: "${1}/"
        permanent: false

    # Plane (god-mode) : son <Router basename="/god-mode/"> (slash final)
    # refuse de matcher l'URL sans slash final et ne rend rien — la page
    # reste bloquée sur le loader statique indéfiniment (bug connu upstream,
    # https://github.com/makeplane/plane/issues/8540). On corrige ici plutôt
    # que d'attendre un correctif Plane.
    redirect-godmode-trailing-slash:
      redirectRegex:
        regex: "^(https?://[^/]+)/god-mode$"
        replacement: "${1}/god-mode/"
        permanent: false
