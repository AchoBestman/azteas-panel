# Configuration dynamique Traefik pour Mailcow
# Ref: https://docs.mailcow.email/post_installation/reverse-proxy/r_p-traefik3/
# Ce fichier est une alternative aux labels Docker — les deux approches sont compatibles.
# Les labels dans docker-compose.override.yml de Mailcow prennent priorité.

http:
  routers:
    mailcow:
      entryPoints: "websecure"
      rule: "Host(`mail.azteas.com`)"
      service: mailcow-svc
      tls:
        certResolver: letsencrypt

    mailcow-autoconfig:
      entryPoints: "websecure"
      rule: "Host(`autoconfig.azteas.com`) && Path(`/mail/config-v1.1.xml`)"
      service: mailcow-svc
      tls:
        certResolver: letsencrypt

    mailcow-autodiscover:
      entryPoints: "websecure"
      rule: "Host(`autodiscover.azteas.com`) && Path(`/autodiscover/autodiscover.xml`)"
      service: mailcow-svc
      tls:
        certResolver: letsencrypt

  services:
    mailcow-svc:
      loadBalancer:
        servers:
          - url: "http://mailcowdockerized-nginx-mailcow-1:8080"
