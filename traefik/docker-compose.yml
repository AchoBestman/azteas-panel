services:
  traefik:
    image: traefik:v3.7
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      # Passthrough TCP vers PostgreSQL/Redis (accès externe, ex:
      # apanel/Vercel) — voir entryPoints "postgres"/"redis-tls"
      # dans traefik.yml et les labels traefik.tcp.* des services concernés .
      - "5432:5432"
      - "6380:6380"
    environment:
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./dynamic:/etc/traefik/dynamic:ro
      - letsencrypt:/letsencrypt
      - /var/log/traefik:/var/log/traefik
    labels:
      - "traefik.enable=true"

      # Dashboard
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.azteas.com`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.middlewares=auth-basic@file,secure-headers@file,rate-limit-admin@file"
    networks:
      - azteas-net
      - coolify

networks:
  azteas-net:
    name: azteas-net
    driver: bridge
  coolify:
    external: true
    name: coolify

volumes:
  letsencrypt: {}
