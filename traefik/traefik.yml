# Configuration statique Traefik
# Ce fichier est lu au démarrage de Traefik

api:
  dashboard: true

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

  websecure:
    address: ":443"
    http:
      tls:
        certResolver: letsencrypt
        options: default


certificatesResolvers:
  # Pour azteas.com et sous-domaines (Cloudflare DNS)
  letsencrypt:
    acme:
      email: "admin@azteas.com"
      storage: /letsencrypt/acme.json
      dnsChallenge:
        provider: cloudflare
        resolvers:
          - "1.1.1.1:53"
          - "8.8.8.8:53"
  # Pour les autres domaines (Hostinger, etc.) — HTTP challenge
  letsencrypt-http:
    acme:
      email: "admin@azteas.com"
      storage: /letsencrypt/acme.json
      httpChallenge:
        entryPoint: web

providers:
  docker:
    exposedByDefault: false
    network: azteas-net
  file:
    directory: /etc/traefik/dynamic
    watch: true

log:
  level: INFO

accessLog:
  filePath: /var/log/traefik/access.log
  format: json
