services:
  dokploy:
    image: dokploy/dokploy:latest
    container_name: dokploy
    restart: unless-stopped
    environment:
      - DISABLE_TRAEFIK=true
      - DATABASE_URL=postgresql://dokploy:${DOKPLOY_DB_PASSWORD}@dokploy-postgres:5432/dokploy
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - dokploy-data:/etc/dokploy
    depends_on:
      dokploy-postgres:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.docker.network=azteas-net
      - traefik.http.routers.dokploy.rule=Host(`dokploy.azteas.com`)
      - traefik.http.routers.dokploy.entrypoints=websecure
      - traefik.http.routers.dokploy.tls=true
      - traefik.http.routers.dokploy.tls.certresolver=letsencrypt
      - traefik.http.routers.dokploy.middlewares=secure-headers@file,rate-limit@file
      - traefik.http.services.dokploy-svc.loadbalancer.server.port=3000
    networks:
      - dokploy-net
      - azteas-net

  dokploy-postgres:
    image: postgres:16-alpine
    container_name: dokploy-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=dokploy
      - POSTGRES_PASSWORD=${DOKPLOY_DB_PASSWORD}
      - POSTGRES_DB=dokploy
    volumes:
      - dokploy-postgres-data:/var/lib/postgresql/data
    networks:
      - dokploy-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dokploy"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  dokploy-net:
    driver: bridge
  azteas-net:
    external: true
    name: azteas-net

volumes:
  dokploy-data: {}
  dokploy-postgres-data: {}
