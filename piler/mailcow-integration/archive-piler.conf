# A placer dans /opt/mailcow-dockerized/data/conf/nginx/archive-piler.conf
# Mailcow charge automatiquement ce fichier au demarrage de nginx-mailcow,
# sans toucher a sa propre configuration interne.

server {
    listen 80;
    listen [::]:80;
    server_name archive.azteas.com;

    location ^~ /.well-known/acme-challenge/ {
        allow all;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name archive.azteas.com;

    # Certificat reel obtenu via acme-mailcow (ADDITIONAL_SAN)
    ssl_certificate /etc/ssl/mail/cert.pem;
    ssl_certificate_key /etc/ssl/mail/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location / {
        # Atteint piler_caddy directement via le reseau Docker partage
        proxy_pass http://piler_caddy:80;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port 443;
    }
}