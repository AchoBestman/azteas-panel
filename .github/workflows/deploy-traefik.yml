name: Deploy Traefik

on:
  push:
    branches:
      - main
    paths:
      - "traefik/**"

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment: azteas-panel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurer la clé SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
          echo "=== Vérification clé ==="
          ssh-keygen -lf ~/.ssh/deploy_key
          echo "=== Lignes dans la clé ==="
          wc -l ~/.ssh/deploy_key
          echo "=== Test connexion SSH ==="
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT }} -o StrictHostKeyChecking=no -v ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "echo OK" 2>&1 | tail -20

      - name: Sync traefik/ vers le VPS
        run: |
          rsync -avz --delete \
            --exclude='.env' \
            --exclude='letsencrypt/' \
            --exclude='dynamic/.htpasswd' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT }}" \
            traefik/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/azteas-panel/traefik/

      - name: Redémarrer Traefik
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          script: |
            cd /opt/azteas-panel/traefik
            docker compose pull
            docker compose up -d
            docker compose ps
