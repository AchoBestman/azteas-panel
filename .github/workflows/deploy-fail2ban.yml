name: Deploy Fail2ban

on:
  push:
    branches:
      - main
    paths:
      - "fail2ban/**"

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment: azteas-panel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurer la clé SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Sync fail2ban/ vers le VPS
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT }}" \
            fail2ban/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/azteas-panel/fail2ban/

      - name: Appliquer la configuration fail2ban
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          script: |
            bash /opt/azteas-panel/fail2ban/setup-fail2ban.sh
            sudo fail2ban-client status
