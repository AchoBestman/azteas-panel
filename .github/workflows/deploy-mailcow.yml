name: Deploy Mailcow

on:
  push:
    branches:
      - main
    paths:
      - "mailcow/**"

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment: azteas-panel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Valider les variables et secrets requis
        run: |
          missing=()
          [ -z "${{ secrets.MAILCOW_B2_ACCOUNT_ID }}" ]         && missing+=("secret: MAILCOW_B2_ACCOUNT_ID")
          [ -z "${{ secrets.MAILCOW_B2_APPLICATION_KEY }}" ]  && missing+=("secret: MAILCOW_B2_APPLICATION_KEY")
          [ -z "${{ secrets.RESTIC_MAILCOW_PASSWORD }}" ]    && missing+=("secret: RESTIC_MAILCOW_PASSWORD")
          [ -z "${{ vars.MAILCOW_HOSTNAME }}" ]              && missing+=("var: MAILCOW_HOSTNAME")
          [ -z "${{ vars.TZ }}" ]                            && missing+=("var: TZ")
          [ -z "${{ vars.ADMIN_EMAIL }}" ]                   && missing+=("var: ADMIN_EMAIL")
          [ -z "${{ vars.MAILCOW_B2_BUCKET }}" ]             && missing+=("var: MAILCOW_B2_BUCKET")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "❌ Variables/secrets manquants dans GitHub :"
            for m in "${missing[@]}"; do echo "   - $m"; done
            exit 1
          fi
          echo "✅ Toutes les variables sont définies"

      - name: Configurer la clé SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Générer le .env Mailcow
        run: |
          cat > /tmp/mailcow.env << 'EOF'

          MAILCOW_HOSTNAME=${{ vars.MAILCOW_HOSTNAME }}
          MAILCOW_TZ=${{ vars.TZ }}
          HTTP_PORT=8080
          HTTPS_PORT=8443
          SKIP_LETS_ENCRYPT=y
          SKIP_HTTP_VERIFICATION=y
          AUTODISCOVER_SAN=n
          ENABLE_IPV6=false
          ADMIN_EMAIL=${{ vars.ADMIN_EMAIL }}
          B2_ACCOUNT_ID=${{ secrets.MAILCOW_B2_ACCOUNT_ID }}
          B2_ACCOUNT_KEY=${{ secrets.MAILCOW_B2_APPLICATION_KEY }}
          B2_BUCKET=${{ vars.MAILCOW_B2_BUCKET }}
          RESTIC_PASSWORD=${{ secrets.RESTIC_MAILCOW_PASSWORD }}
          RESTIC_REPOSITORY=b2:${{ vars.MAILCOW_B2_BUCKET }}:mailcow
          EOF

      - name: Sync mailcow/ vers le VPS
        run: |
          rsync -avz --delete \
            --exclude='.env' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT }}" \
            mailcow/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/azteas-panel/mailcow/

      - name: Déployer le .env
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT }}" \
            /tmp/mailcow.env \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/azteas-panel/mailcow/.env
          rm -f /tmp/mailcow.env

      - name: Appliquer sur le VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          script: |
            chmod 600 /opt/azteas-panel/mailcow/.env

            # Initialiser le repo restic si nécessaire
            cd /opt/azteas-panel/mailcow
            set -a; source .env > /dev/null 2>&1; set +a
            if ! restic snapshots > /dev/null 2>&1; then
              echo "Initialisation du repository restic Backblaze B2..."
              restic init > /dev/null && echo "Repository initialisé" || echo "⚠️  Echec initialisation restic"
            else
              echo "Repository restic déjà initialisé"
            fi

            if [ -d /opt/mailcow-dockerized ]; then
              cp /opt/azteas-panel/mailcow/docker-compose.override.yml /opt/mailcow-dockerized/docker-compose.override.yml
              mkdir -p /opt/mailcow-dockerized/data/web/css/build
              # Le placeholder par défaut appartient à root (créé par le setup initial de mailcow) :
              # rm avant cp car l'utilisateur de déploiement n'a pas les droits d'écriture sur ce fichier root.
              rm -f /opt/mailcow-dockerized/data/web/css/build/0081-custom-mailcow.css
              cp /opt/azteas-panel/mailcow/css/custom.css /opt/mailcow-dockerized/data/web/css/build/0081-custom-mailcow.css

              # Thème SOGo (palette Azteas). custom-theme.js est déjà monté par défaut
              # par mailcow (docker-compose.yml de base) ; custom-theme.css (compilé) est
              # généré automatiquement par l'étape Playwright ci-dessous, jamais commité.
              mkdir -p /opt/mailcow-dockerized/data/conf/sogo
              rm -f /opt/mailcow-dockerized/data/conf/sogo/custom-theme.js
              cp /opt/azteas-panel/mailcow/sogo/custom-theme.js /opt/mailcow-dockerized/data/conf/sogo/custom-theme.js

              # Favicon Azteas (custom-favicon.ico est déjà monté par défaut par mailcow
              # vers /usr/local/lib/GNUstep/SOGo/WebServerResources/img/sogo.ico).
              rm -f /opt/mailcow-dockerized/data/conf/sogo/custom-favicon.ico
              cp /opt/azteas-panel/mailcow/sogo/custom-favicon.ico /opt/mailcow-dockerized/data/conf/sogo/custom-favicon.ico

              # Titre de l'onglet navigateur (remplace le "SOGo Groupware" par défaut).
              # Ne prend effet que lorsque SOGoUIxDebugEnabled = No (donc une fois le
              # mode debug redésactivé en fin de déploiement, voir plus bas).
              sed -i 's|SOGoPageTitle = "[^"]*";|SOGoPageTitle = "AZTEAS WEBMAIL";|' /opt/mailcow-dockerized/data/conf/sogo/sogo.conf

              # Active le mode debug SOGo pour que le thème Angular Material soit calculé
              # côté client (nécessaire pour l'extraction Playwright qui suit).
              if grep -q "^\s*//\s*SOGoUIxDebugEnabled" /opt/mailcow-dockerized/data/conf/sogo/sogo.conf; then
                sed -i 's|//\s*SOGoUIxDebugEnabled = YES;|SOGoUIxDebugEnabled = YES;|' /opt/mailcow-dockerized/data/conf/sogo/sogo.conf
              fi

              # Ne redémarrer que si Mailcow tourne déjà (réseau existant)
              if docker network ls | grep -q mailcowdockerized_mailcow-network; then
                cd /opt/mailcow-dockerized
                docker compose up -d nginx-mailcow certdumper sogo-mailcow
                echo "Services mis à jour"
              else
                echo "Mailcow pas encore démarré — lancer manuellement : cd /opt/mailcow-dockerized && docker compose up -d"
              fi
            fi

      - name: Attendre que SOGo redémarre en mode debug
        run: sleep 20

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Installer Playwright
        run: |
          cd mailcow/sogo/theme-extract
          npm install
          npx playwright install --with-deps chromium

      - name: Extraire le thème SOGo compilé (Playwright)
        run: |
          cd mailcow/sogo/theme-extract
          node extract.mjs
        env:
          SOGO_URL: https://${{ vars.MAILCOW_HOSTNAME }}/SOGo/
          OUTPUT_PATH: /tmp/custom-theme.css

      - name: Déployer le thème SOGo généré
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT }}" \
            /tmp/custom-theme.css \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/mailcow-dockerized/data/conf/sogo/custom-theme.css
          rm -f /tmp/custom-theme.css

      - name: Désactiver le mode debug SOGo
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          script: |
            sed -i 's|^\(\s*\)SOGoUIxDebugEnabled = YES;|\1//SOGoUIxDebugEnabled = YES;|' /opt/mailcow-dockerized/data/conf/sogo/sogo.conf
            cd /opt/mailcow-dockerized
            docker compose restart sogo-mailcow
