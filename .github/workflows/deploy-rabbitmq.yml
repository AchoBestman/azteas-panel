name: Deploy RabbitMQ

on:
  push:
    branches:
      - main
    paths:
      - "rabbitmq/**"

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment: azteas-panel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Valider les variables et secrets requis
        run: |
          missing=()
          [ -z "${{ secrets.RABBITMQ_PASSWORD }}" ] && missing+=("secret: RABBITMQ_PASSWORD")
          [ -z "${{ vars.RABBITMQ_USER }}" ]         && missing+=("var: RABBITMQ_USER")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "❌ Manquants :"
            for m in "${missing[@]}"; do echo "   - $m"; done
            exit 1
          fi
          echo "✅ Toutes les variables sont définies"

      - name: Configurer la clé SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Générer le .env
        run: |
          cat > /tmp/rabbitmq.env << 'EOF'
          RABBITMQ_USER=${{ vars.RABBITMQ_USER }}
          RABBITMQ_PASSWORD=${{ secrets.RABBITMQ_PASSWORD }}
          EOF

      - name: Sync rabbitmq/ vers le VPS
        run: |
          rsync -avz --delete --exclude='.env' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT }}" \
            rabbitmq/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/azteas-panel/rabbitmq/

      - name: Déployer le .env
        run: |
          rsync -avz -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT }}" \
            /tmp/rabbitmq.env ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/azteas-panel/rabbitmq/.env
          rm -f /tmp/rabbitmq.env

      - name: Démarrer RabbitMQ
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          script: |
            chmod 600 /opt/azteas-panel/rabbitmq/.env
            cd /opt/azteas-panel/rabbitmq
            docker compose pull
            docker compose up -d
            docker compose ps
