name: Deploy Coolify

on:
  push:
    branches:
      - main
    paths:
      - "coolify/**"

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment: azteas-panel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Valider les variables et secrets requis
        run: |
          missing=()
          [ -z "${{ secrets.COOLIFY_APP_KEY }}" ]       && missing+=("secret: COOLIFY_APP_KEY")
          [ -z "${{ secrets.COOLIFY_DB_PASSWORD }}" ]   && missing+=("secret: COOLIFY_DB_PASSWORD")
          [ -z "${{ secrets.COOLIFY_REDIS_PASSWORD }}" ] && missing+=("secret: COOLIFY_REDIS_PASSWORD")
          [ -z "${{ vars.COOLIFY_APP_ID }}" ]           && missing+=("var: COOLIFY_APP_ID")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "❌ Manquants :"
            for m in "${missing[@]}"; do echo "   - $m"; done
            exit 1
          fi
          echo "✅ Toutes les variables sont définies"

      - name: Configurer la clé SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Générer le .env
        run: |
          cat > /tmp/coolify.env << 'EOF'
          COOLIFY_APP_ID=${{ vars.COOLIFY_APP_ID }}
          COOLIFY_APP_KEY=${{ secrets.COOLIFY_APP_KEY }}
          COOLIFY_DB_PASSWORD=${{ secrets.COOLIFY_DB_PASSWORD }}
          COOLIFY_REDIS_PASSWORD=${{ secrets.COOLIFY_REDIS_PASSWORD }}
          EOF

      - name: Sync coolify/ vers le VPS
        run: |
          rsync -avz --delete --exclude='.env' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT }}" \
            coolify/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/azteas-panel/coolify/

      - name: Déployer le .env
        run: |
          rsync -avz -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT }}" \
            /tmp/coolify.env ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/azteas-panel/coolify/.env
          rm -f /tmp/coolify.env

      - name: Démarrer Coolify
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          script: |
            chmod 600 /opt/azteas-panel/coolify/.env
            cd /opt/azteas-panel/coolify
            bash setup.sh
            docker compose pull
            docker compose up -d
            docker compose ps
