name: Deploy OpenArchiver

on:
  push:
    branches:
      - main
    paths:
      - "openarchiver/**"

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment: azteas-panel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Valider les variables et secrets requis
        run: |
          missing=()
          [ -z "${{ secrets.OPENARCHIVER_DB_PASSWORD }}" ]        && missing+=("secret: OPENARCHIVER_DB_PASSWORD")
          [ -z "${{ secrets.OPENARCHIVER_R2_ACCESS_KEY_ID }}" ]   && missing+=("secret: OPENARCHIVER_R2_ACCESS_KEY_ID")
          [ -z "${{ secrets.OPENARCHIVER_R2_SECRET_ACCESS_KEY }}" ] && missing+=("secret: OPENARCHIVER_R2_SECRET_ACCESS_KEY")
          [ -z "${{ secrets.OPENARCHIVER_MEILI_MASTER_KEY }}" ]   && missing+=("secret: OPENARCHIVER_MEILI_MASTER_KEY")
          [ -z "${{ secrets.OPENARCHIVER_JWT_SECRET }}" ]         && missing+=("secret: OPENARCHIVER_JWT_SECRET")
          [ -z "${{ secrets.OPENARCHIVER_ENCRYPTION_KEY }}" ]     && missing+=("secret: OPENARCHIVER_ENCRYPTION_KEY")
          [ -z "${{ vars.OPENARCHIVER_HOST }}" ]          && missing+=("var: OPENARCHIVER_HOST")
          [ -z "${{ vars.OPENARCHIVER_R2_ACCOUNT_ID }}" ]         && missing+=("var: OPENARCHIVER_R2_ACCOUNT_ID")
          [ -z "${{ vars.POSTGRES_USER }}" ]                      && missing+=("var: POSTGRES_USER (partagé postgresql/)")
          [ -z "${{ secrets.POSTGRES_PASSWORD }}" ]               && missing+=("secret: POSTGRES_PASSWORD (partagé postgresql/)")
          [ -z "${{ secrets.REDIS_PASSWORD }}" ]                  && missing+=("secret: REDIS_PASSWORD (partagé redis/)")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "❌ Variables/secrets manquants dans GitHub :"
            for m in "${missing[@]}"; do echo "   - $m"; done
            exit 1
          fi
          echo "✅ Toutes les variables sont définies"

      - name: Configurer la clé SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Générer le .env OpenArchiver
        run: |
          cat > /tmp/openarchiver.env << 'EOF'
          OPENARCHIVER_HOST=${{ vars.OPENARCHIVER_HOST }}
          VERSION=${{ vars.OPENARCHIVER_VERSION || 'latest' }}
          OPENARCHIVER_DB_PASSWORD=${{ secrets.OPENARCHIVER_DB_PASSWORD }}
          OPENARCHIVER_R2_ACCOUNT_ID=${{ vars.OPENARCHIVER_R2_ACCOUNT_ID }}
          OPENARCHIVER_R2_BUCKET=${{ vars.OPENARCHIVER_R2_BUCKET || 'openarchiver' }}
          OPENARCHIVER_R2_ACCESS_KEY_ID=${{ secrets.OPENARCHIVER_R2_ACCESS_KEY_ID }}
          OPENARCHIVER_R2_SECRET_ACCESS_KEY=${{ secrets.OPENARCHIVER_R2_SECRET_ACCESS_KEY }}
          OPENARCHIVER_MEILI_MASTER_KEY=${{ secrets.OPENARCHIVER_MEILI_MASTER_KEY }}
          OPENARCHIVER_JWT_SECRET=${{ secrets.OPENARCHIVER_JWT_SECRET }}
          OPENARCHIVER_ENCRYPTION_KEY=${{ secrets.OPENARCHIVER_ENCRYPTION_KEY }}
          OPENARCHIVER_SYNC_FREQUENCY=${{ vars.OPENARCHIVER_SYNC_FREQUENCY }}
          POSTGRES_USER=${{ vars.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
          EOF

      - name: Sync openarchiver/ vers le VPS
        run: |
          rsync -avz --delete --exclude='.env' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT }}" \
            openarchiver/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/azteas-panel/openarchiver/

      - name: Déployer le .env
        run: |
          rsync -avz -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT }}" \
            /tmp/openarchiver.env ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/azteas-panel/openarchiver/.env
          rm -f /tmp/openarchiver.env

      - name: Démarrer OpenArchiver
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          script: |
            chmod 600 /opt/azteas-panel/openarchiver/.env
            cd /opt/azteas-panel/openarchiver
            docker compose pull
            docker compose up -d
            docker compose ps
