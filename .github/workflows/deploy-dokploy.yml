name: Deploy Dokploy

on:
  push:
    branches:
      - main
    paths:
      - "dokploy/**"

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment: azteas-panel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurer la clé SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Valider les variables et secrets requis
        run: |
          missing=()
          [ -z "${{ secrets.DOKPLOY_DB_PASSWORD }}" ]  && missing+=("secret: DOKPLOY_DB_PASSWORD")
          [ -z "${{ secrets.BETTER_AUTH_SECRET }}" ]    && missing+=("secret: BETTER_AUTH_SECRET")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "❌ Manquants :"
            for m in "${missing[@]}"; do echo "   - $m"; done
            exit 1
          fi
          echo "✅ Toutes les variables sont définies"

      - name: Générer le .env
        run: |
          cat > /tmp/dokploy.env << 'EOF'
          DOKPLOY_DB_PASSWORD=${{ secrets.DOKPLOY_DB_PASSWORD }}
          BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET }}
          EOF

      - name: Sync dokploy/ vers le VPS
        run: |
          rsync -avz --delete --exclude='.env' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT }}" \
            dokploy/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/azteas-panel/dokploy/

      - name: Déployer le .env
        run: |
          rsync -avz -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT }}" \
            /tmp/dokploy.env ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/azteas-panel/dokploy/.env
          rm -f /tmp/dokploy.env

      - name: Démarrer Dokploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          script: |
            cd /opt/azteas-panel/dokploy
            bash setup.sh
            docker compose pull
            docker compose up -d
            docker compose ps
