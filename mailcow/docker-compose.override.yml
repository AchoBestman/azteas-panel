# Ce fichier est copié dans /opt/mailcow-dockerized/ par setup.sh
# Configuration Mailcow + Traefik v3
# Traefik se connecte à nginx-mailcow via HTTPS (port 443 interne)
# pour éviter la boucle de redirection HTTP→HTTPS de nginx-mailcow

services:

  nginx-mailcow:
    expose:
      - 8443
    labels:
      - traefik.enable=true
      - traefik.docker.network=azteas-net

      # Route principale : mail.azteas.com
      - traefik.http.routers.mailcow.entrypoints=websecure
      - traefik.http.routers.mailcow.rule=Host(`mail.azteas.com`)
      - traefik.http.routers.mailcow.tls=true
      - traefik.http.routers.mailcow.tls.certresolver=letsencrypt
      - traefik.http.routers.mailcow.service=mailcow-svc
      - traefik.http.routers.mailcow.middlewares=secure-headers@file,rate-limit-mailcow@file

      # Redirige /user vers / : seuls les admins doivent accéder à l'interface
      # Mailcow (via /admin) ; les mailbox users n'utilisent que le webmail
      # (SOGo). Priorité plus haute que la route "mailcow" pour matcher en premier.
      - traefik.http.routers.mailcow-redirect-user.entrypoints=websecure
      - traefik.http.routers.mailcow-redirect-user.rule=Host(`mail.azteas.com`) && PathPrefix(`/user`)
      - traefik.http.routers.mailcow-redirect-user.tls=true
      - traefik.http.routers.mailcow-redirect-user.tls.certresolver=letsencrypt
      - traefik.http.routers.mailcow-redirect-user.service=mailcow-svc
      - traefik.http.routers.mailcow-redirect-user.priority=100
      - traefik.http.routers.mailcow-redirect-user.middlewares=redirect-user-to-root@file

      # Retire le flux natif "mot de passe oublié" de Mailcow (data/web/reset-password.php) au
      # profit du nôtre (apanel.azteas.com/mailbox/reset-password) : voir
      # redirect-lostpassword-to-apanel@file dans traefik/dynamic/middlewares.yml pour le détail.
      # Même priorité que mailcow-redirect-user (tous deux plus spécifiques que la route
      # générique "mailcow" ci-dessus).
      - traefik.http.routers.mailcow-redirect-lostpassword.entrypoints=websecure
      - traefik.http.routers.mailcow-redirect-lostpassword.rule=Host(`mail.azteas.com`) && PathPrefix(`/reset-password.php`)
      - traefik.http.routers.mailcow-redirect-lostpassword.tls=true
      - traefik.http.routers.mailcow-redirect-lostpassword.tls.certresolver=letsencrypt
      - traefik.http.routers.mailcow-redirect-lostpassword.service=mailcow-svc
      - traefik.http.routers.mailcow-redirect-lostpassword.priority=100
      - traefik.http.routers.mailcow-redirect-lostpassword.middlewares=redirect-lostpassword-to-apanel@file

      # Route autoconfig
      - traefik.http.routers.mailcow-autoconfig.entrypoints=websecure
      - traefik.http.routers.mailcow-autoconfig.rule=Host(`autoconfig.azteas.com`) && Path(`/mail/config-v1.1.xml`)
      - traefik.http.routers.mailcow-autoconfig.tls.certresolver=letsencrypt
      - traefik.http.routers.mailcow-autoconfig.service=mailcow-svc

      # Route autodiscover
      - traefik.http.routers.mailcow-autodiscover.entrypoints=websecure
      - traefik.http.routers.mailcow-autodiscover.rule=Host(`autodiscover.azteas.com`) && Path(`/autodiscover/autodiscover.xml`)
      - traefik.http.routers.mailcow-autodiscover.tls.certresolver=letsencrypt
      - traefik.http.routers.mailcow-autodiscover.service=mailcow-svc

      # Connexion HTTPS vers nginx-mailcow (port 443 interne, certificat snake-oil accepté)
      - traefik.http.services.mailcow-svc.loadbalancer.server.port=8443
      - traefik.http.services.mailcow-svc.loadbalancer.server.scheme=https
      - traefik.http.services.mailcow-svc.loadbalancer.serversTransport=insecure-skip-verify@file

    networks:
      mailcow-network:
        aliases:
          - nginx
      azteas-net:

  sogo-mailcow:
    # custom-theme.js est déjà monté par défaut par mailcow (docker-compose.yml de base).
    # custom-theme.css est le CSS Angular Material compilé (palette Azteas), extrait via
    # le mode debug SOGo puis sauvegardé directement sur le VPS (voir mailcow/sogo/custom-theme.js).
    volumes:
      - ./data/conf/sogo/custom-theme.css:/usr/local/lib/GNUstep/SOGo/WebServerResources/css/theme-default.css:z

  certdumper:
    image: ghcr.io/kereis/traefik-certs-dumper:latest
    container_name: mailcow_certdumper
    restart: unless-stopped
    network_mode: none
    command: --restart-containers mailcowdockerized-postfix-mailcow-1,mailcowdockerized-dovecot-mailcow-1
    volumes:
      - traefik_letsencrypt:/traefik:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /opt/mailcow-dockerized/data/assets/ssl:/output:rw
    environment:
      - DOMAIN=mail.azteas.com
      - ACME_FILE_PATH=/traefik/acme.json

networks:
  azteas-net:
    external: true
    name: azteas-net
  mailcow-network:
    external: true
    name: mailcowdockerized_mailcow-network

volumes:
  traefik_letsencrypt:
    external: true
    name: traefik_letsencrypt
