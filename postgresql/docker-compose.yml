services:
  # ---- Provisioning (one-shot, idempotent) ----
  # Génère un certificat TLS auto-signé pour l'accès externe (apanel/
  # via Traefik TCP passthrough, cf. plus bas) si absent. Ne régénère jamais un
  # certificat existant, donc sans effet aux déploiements suivants.
  postgresql-tls-init:
    image: alpine:3.20
    container_name: postgresql-tls-init
    restart: "no"
    volumes:
      - postgresql_certs:/certs
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        apk add --no-cache openssl >/dev/null
        if [ ! -f /certs/server.crt ]; then
          openssl req -new -x509 -days 825 -nodes \
            -newkey rsa:2048 \
            -keyout /certs/server.key -out /certs/server.crt \
            -subj "/CN=${POSTGRES_TLS_CN:-pg-tcp.azteas.com}"
          echo "Certificat TLS PostgreSQL généré (CN=${POSTGRES_TLS_CN:-pg-tcp.azteas.com})."
        else
          echo "Certificat TLS PostgreSQL déjà présent, inchangé."
        fi
        # uid/gid 999 = user "postgres" dans l'image officielle postgres (base
        # de pgvector/pgvector) — Postgres refuse de démarrer si la clé privée
        # est lisible par un autre user.
        chown 999:999 /certs/server.key /certs/server.crt
        chmod 600 /certs/server.key

  # Crée/corrige les permissions du dossier de log bind-monté AVANT que
  # postgresql démarre. Sans ça, Docker crée /var/log/postgresql sur l'hôte
  # appartenant à root au premier bind-mount, et Postgres (uid 999, cf.
  # postgresql-tls-init ci-dessus) ne peut pas y écrire — logging_collector
  # échoue à l'ouverture du fichier, ce qui fait échouer le DÉMARRAGE ENTIER
  # de Postgres (pas juste un warning), avec effet domino sur tout ce qui
  # partage cette instance (Dokploy, Plane, pgAdmin, apanel).
  postgresql-logdir-init:
    image: alpine:3.20
    container_name: postgresql-logdir-init
    restart: "no"
    volumes:
      - /var/log/postgresql:/var/log/postgresql
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        chown 999:999 /var/log/postgresql
        echo "Permissions /var/log/postgresql OK (999:999)."

  postgresql:
    image: pgvector/pgvector:pg17
    container_name: postgresql
    restart: unless-stopped
    depends_on:
      postgresql-tls-init:
        condition: service_completed_successfully
      postgresql-logdir-init:
        condition: service_completed_successfully
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
    command:
      - postgres
      - -c
      - ssl=on
      - -c
      - ssl_cert_file=/etc/postgresql/certs/server.crt
      - -c
      - ssl_key_file=/etc/postgresql/certs/server.key
      - -c
      - logging_collector=on
      - -c
      - log_directory=/var/log/postgresql
      - -c
      - log_filename=postgresql.log
      # %h (host client) requis par la jail fail2ban postgres-auth — absent du
      # log_line_prefix par défaut.
      - -c
      - log_line_prefix=%m [%p] %q%u@%d,host=%h
      - -c
      - log_connections=on
    ports:
      - "${FORWARD_DB_PORT:-5433}:5432"
    volumes:
      - postgresql_data:/var/lib/postgresql/data
      - postgresql_certs:/etc/postgresql/certs:ro
      - ./init:/docker-entrypoint-initdb.d:ro
      # Bind mount hôte : lu directement par fail2ban (jail postgres-auth),
      # qui tourne nativement sur le VPS, pas en conteneur.
      - /var/log/postgresql:/var/log/postgresql
    networks:
      - postgresql_net
      - azteas-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - traefik.enable=true
      - traefik.docker.network=azteas-net
      # Passthrough : Postgres négocie lui-même son TLS (SSLRequest avant le
      # handshake), Traefik ne fait que router les octets bruts par port —
      # pas de HostSNI possible (Postgres n'envoie pas de SNI).
      - traefik.tcp.routers.postgres-tcp.rule=HostSNI(`*`)
      - traefik.tcp.routers.postgres-tcp.entrypoints=postgres
      - traefik.tcp.routers.postgres-tcp.tls.passthrough=true
      - traefik.tcp.services.postgres-tcp.loadbalancer.server.port=5432

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    restart: unless-stopped
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD}
      - PGADMIN_CONFIG_SERVER_MODE=True
      - PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION=True
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgresql:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.docker.network=azteas-net
      - traefik.http.routers.pgadmin.entrypoints=websecure
      - traefik.http.routers.pgadmin.rule=Host(`pgadmin.azteas.com`)
      - traefik.http.routers.pgadmin.tls=true
      - traefik.http.routers.pgadmin.tls.certresolver=letsencrypt
      - traefik.http.routers.pgadmin.middlewares=secure-headers@file,rate-limit-pgadmin@file
      - traefik.http.services.pgadmin-svc.loadbalancer.server.port=80
    networks:
      - postgresql_net
      - azteas-net

networks:
  postgresql_net:
    driver: bridge
  azteas-net:
    external: true
    name: azteas-net

volumes:
  postgresql_data: {}
  postgresql_certs: {}
  pgadmin_data: {}
