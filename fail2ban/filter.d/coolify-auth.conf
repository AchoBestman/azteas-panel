# Logins échoués sur Coolify via Traefik (access log JSON)
# POST /api/v1/security/authenticate avec status 4xx = échec

[Definition]
failregex = .*"ClientHost":"<HOST>".*"RequestAddr":"coolify\.azteas\.com".*"RequestMethod":"POST".*"RequestPath":"\/api\/v1\/security\/authenticate".*"DownstreamStatus":4[0-9][0-9].*
ignoreregex =
