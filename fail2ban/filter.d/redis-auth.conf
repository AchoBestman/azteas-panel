# Echecs d'authentification Redis (accès externe via Traefik TCP passthrough,
# ex: user ACL dédié agent-suite-admin depuis Vercel).
#
# Redis ne logge pas nativement les échecs AUTH dans un fichier. Ce filtre lit
# /var/log/redis/redis-auth.log, alimenté par le sidecar redis-acl-log-exporter
# (voir redis/docker-compose.yml) qui traduit périodiquement `ACL LOG` en
# lignes "redis AUTH_FAILED host=<ip>".

[Definition]
failregex = redis AUTH_FAILED host=<HOST>
ignoreregex =
