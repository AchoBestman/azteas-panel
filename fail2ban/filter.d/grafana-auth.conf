# Logins échoués sur Grafana via Traefik (access log JSON)
# POST /api/login avec status 4xx = échec d'authentification

[Definition]
failregex = .*"ClientHost":"<HOST>".*"RequestAddr":"grafana\.azteas\.com".*"RequestMethod":"POST".*"RequestPath":"\/api\/login".*"DownstreamStatus":4[0-9][0-9].*
ignoreregex =
