# Echecs d'authentification PostgreSQL (accès externe via Traefik TCP passthrough,
# ex: rôle dédié agent-suite-admin depuis Vercel).
#
# Nécessite log_line_prefix = '%m [%p] %q%u@%d,host=%h ' (voir
# postgresql/docker-compose.yml) pour que l'IP cliente soit présente dans la
# ligne de log — absente du format par défaut.

[Definition]
failregex = ,host=<HOST>\s.*FATAL:\s+password authentication failed for user
ignoreregex =
