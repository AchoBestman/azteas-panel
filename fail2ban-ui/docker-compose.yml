services:
  fail2ban-ui:
    image: swissmakers/fail2ban-ui:latest
    container_name: fail2ban-ui
    restart: unless-stopped
    # Publié uniquement sur le loopback de l'hôte : fail2ban (qui tourne sur
    # l'hôte, cf. ../fail2ban) en a besoin pour envoyer ses callbacks de
    # ban/unban à l'UI. Jamais exposé publiquement — Traefik route via le
    # réseau Docker azteas-net comme les autres services.
    # Port hôte 18080 (pas 8080) : le nginx de Mailcow publie déjà 0.0.0.0:8080
    # (HTTP_PORT dans le .env racine) — un conflit qui a empêché ce conteneur
    # de démarrer correctement lors du premier déploiement.
    ports:
      - "127.0.0.1:18080:8080"
    environment:
      - PORT=8080
      - BIND_ADDRESS=0.0.0.0
      - AUTODARK=${AUTODARK:-false}
      - DISABLE_EXTERNAL_IP_LOOKUP=${DISABLE_EXTERNAL_IP_LOOKUP:-true}
      - UPDATE_CHECK=${UPDATE_CHECK:-false}
      # Le défaut de l'appli (http://127.0.0.1:${PORT}) se base sur son port
      # interne (8080), pas sur le port publié côté hôte (18080) — donc
      # explicite ici, sinon fail2ban (process hôte) callback au mauvais port.
      - CALLBACK_URL=http://127.0.0.1:18080
      # - CALLBACK_SECRET=
    volumes:
      # Base SQLite, réglages de l'appli, clés SSH générées par fail2ban-ui
      - fail2ban_ui_config:/config
      # Lecture seule : test des logpath avant activation d'une jail
      - /var/log:/var/log:ro
      # Fail2ban tourne sur l'hôte : accès à sa config...
      - /etc/fail2ban:/etc/fail2ban
      # ...et à son socket de contrôle
      - /var/run/fail2ban:/var/run/fail2ban
      # Bases MaxMind GeoLite2, alimentées par le service geoipupdate
      # ci-dessous. Activer l'enrichissement GeoIP dans Settings de l'UI
      # après le premier démarrage (pas de variable d'env pour ça).
      - geoip_data:/usr/share/GeoIP:ro
    labels:
      - traefik.enable=true
      - traefik.docker.network=azteas-net
      - traefik.http.routers.fail2ban-ui.entrypoints=websecure
      - traefik.http.routers.fail2ban-ui.rule=Host(`fail2ban.azteas.com`)
      - traefik.http.routers.fail2ban-ui.tls=true
      - traefik.http.routers.fail2ban-ui.tls.certresolver=letsencrypt
      - traefik.http.routers.fail2ban-ui.middlewares=auth-basic@file,secure-headers@file,rate-limit-fail2ban-ui@file
      - traefik.http.services.fail2ban-ui-svc.loadbalancer.server.port=8080
    networks:
      - azteas-net
    depends_on:
      - geoipupdate

  # Télécharge et met à jour les bases MaxMind GeoLite2 dans le volume
  # geoip_data, lu en lecture seule par fail2ban-ui. Image officielle MaxMind.
  # https://github.com/maxmind/geoipupdate
  geoipupdate:
    image: ghcr.io/maxmind/geoipupdate:latest
    container_name: geoipupdate
    restart: unless-stopped
    environment:
      - GEOIPUPDATE_ACCOUNT_ID=${GEOIPUPDATE_ACCOUNT_ID}
      - GEOIPUPDATE_LICENSE_KEY=${GEOIPUPDATE_LICENSE_KEY}
      - GEOIPUPDATE_EDITION_IDS=GeoLite2-Country
      # Une mise à jour par semaine suffit : MaxMind ne republie GeoLite2
      # qu'environ chaque mardi.
      - GEOIPUPDATE_FREQUENCY=168
    volumes:
      - geoip_data:/usr/share/GeoIP

networks:
  azteas-net:
    external: true
    name: azteas-net

volumes:
  fail2ban_ui_config:
  geoip_data:
